<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>哦哦哦哦哦</title>
    <!-- Jelly-style cute Chinese font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 30%, #e0f7fa 60%, #fff9c4 100%);
            background-size: 300% 300%;
            animation: bgShift 12s ease-in-out infinite;
            position: relative;
        }

        @keyframes bgShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            25% {
                background-position: 100% 0%;
            }

            50% {
                background-position: 100% 100%;
            }

            75% {
                background-position: 0% 100%;
            }
        }

        /* ---- Cute floating shapes background ---- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle 120px at 15% 20%, rgba(255, 154, 158, 0.25) 0%, transparent 100%),
                radial-gradient(circle 100px at 80% 30%, rgba(161, 196, 253, 0.25) 0%, transparent 100%),
                radial-gradient(circle 90px at 25% 75%, rgba(162, 255, 195, 0.2) 0%, transparent 100%),
                radial-gradient(circle 110px at 70% 80%, rgba(253, 203, 110, 0.2) 0%, transparent 100%),
                radial-gradient(circle 80px at 50% 50%, rgba(214, 162, 232, 0.15) 0%, transparent 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* ---- Floating decorations (CSS only, no canvas!) ---- */
        .deco {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 28px;
            opacity: 0.5;
            animation: decoFloat linear infinite;
        }

        @keyframes decoFloat {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
            }

            25% {
                transform: translateY(-25vh) rotate(90deg) scale(1.1);
            }

            50% {
                transform: translateY(-50vh) rotate(180deg) scale(0.9);
            }

            75% {
                transform: translateY(-75vh) rotate(270deg) scale(1.05);
            }

            100% {
                transform: translateY(-110vh) rotate(360deg) scale(1);
            }
        }

        /* ============================================================
           MAIN TEXT CONTAINER
           ============================================================ */
        .scene {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .text-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        /* ---- INDIVIDUAL CHARACTER ---- */
        .char {
            position: relative;
            font-size: clamp(60px, 12vw, 140px);
            font-weight: 400;
            display: inline-block;
            cursor: default;
            /* Initial state: hidden, will be animated by JS */
            opacity: 0;
            transform: scale(0);
            /* Jelly text styling */
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            /* will be set per-char via JS for unique colors */
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.08));
        }

        /* Jelly shine highlight */
        .char::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 25%;
            width: 35%;
            height: 22%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.55) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: rotate(-15deg);
        }

        /* ---- Hover bounce ---- */
        .char:hover {
            transform: scale(1.25) translateY(-12px) rotate(-5deg) !important;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.12)) brightness(1.1);
        }

        /* ---- Entrance animation class ---- */
        .char.entering {
            animation: charRunIn var(--enter-duration, 1.2s) cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes charRunIn {
            0% {
                opacity: 0;
                transform: translate(var(--enter-x, 0px), var(--enter-y, 200px)) scale(0.2) rotate(var(--enter-rot, 0deg));
            }

            40% {
                opacity: 1;
                transform: translate(0, -15px) scale(1.15) rotate(0deg);
            }

            55% {
                transform: translate(0, 8px) scale(0.9) rotate(2deg);
            }

            70% {
                transform: translate(0, -6px) scale(1.08) rotate(-1deg);
            }

            82% {
                transform: translate(0, 3px) scale(0.97) rotate(0.5deg);
            }

            92% {
                transform: translate(0, -2px) scale(1.02) rotate(0deg);
            }

            100% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
        }

        /* ---- Idle animations (applied randomly by JS) ---- */
        .char.idle-bounce {
            animation: idleBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes idleBounce {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            30% {
                transform: translateY(-20px) scale(1.08, 0.92);
            }

            50% {
                transform: translateY(5px) scale(0.95, 1.06);
            }

            70% {
                transform: translateY(-8px) scale(1.03, 0.97);
            }
        }

        .char.idle-wiggle {
            animation: idleWiggle 0.5s ease-in-out;
        }

        @keyframes idleWiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(-12deg);
            }

            40% {
                transform: rotate(10deg);
            }

            60% {
                transform: rotate(-6deg);
            }

            80% {
                transform: rotate(4deg);
            }
        }

        .char.idle-squish {
            animation: idleSquish 0.5s ease-in-out;
        }

        @keyframes idleSquish {

            0%,
            100% {
                transform: scale(1, 1);
            }

            25% {
                transform: scale(1.15, 0.85);
            }

            50% {
                transform: scale(0.9, 1.12);
            }

            75% {
                transform: scale(1.05, 0.95);
            }
        }

        .char.idle-peek {
            animation: idlePeek 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes idlePeek {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            30% {
                transform: translateY(-10px) rotate(8deg);
            }

            60% {
                transform: translateY(-5px) rotate(-5deg);
            }
        }

        .char.idle-jiggle {
            animation: idleJiggle 0.4s ease-in-out;
        }

        @keyframes idleJiggle {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-3px);
            }
        }

        /* ---- Little animal ears/features on chars (CSS) ---- */
        .char .ear-left,
        .char .ear-right {
            position: absolute;
            top: -12px;
            width: 18px;
            height: 22px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        .char .ear-left {
            left: 15%;
            transform: rotate(-20deg) scale(0.8);
        }

        .char .ear-right {
            right: 15%;
            transform: rotate(20deg) scale(0.8);
        }

        .char:hover .ear-left,
        .char:hover .ear-right {
            opacity: 1;
            transform: rotate(0deg) scale(1) translateY(-5px);
        }

        .char .blush-left,
        .char .blush-right {
            position: absolute;
            bottom: 25%;
            width: 14px;
            height: 9px;
            border-radius: 50%;
            background: rgba(255, 150, 150, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .char .blush-left {
            left: 8%;
        }

        .char .blush-right {
            right: 8%;
        }

        .char:hover .blush-left,
        .char:hover .blush-right {
            opacity: 1;
        }

        /* ============================================================
           SUBTITLE
           ============================================================ */
        .subtitle {
            color: rgba(180, 130, 160, 0.7);
            font-size: clamp(14px, 2.5vw, 22px);
            letter-spacing: 0.3em;
            opacity: 0;
            transform: translateY(15px);
            animation: subtitleIn 1.5s ease 3.5s forwards;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.5);
        }

        @keyframes subtitleIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           CLICK HEARTS
           ============================================================ */
        .click-heart {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: heartPop 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes heartPop {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(var(--rot));
            }
        }

        /* ============================================================
           SPARKLE PARTICLES
           ============================================================ */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: sparkleFade 2.5s ease-out forwards;
        }

        @keyframes sparkleFade {
            0% {
                opacity: 0.8;
                transform: scale(1) translateY(0);
            }

            100% {
                opacity: 0;
                transform: scale(0) translateY(-60px);
            }
        }

        /* ============================================================
           LITTLE PAWS TRAIL
           ============================================================ */
        .paw {
            position: fixed;
            pointer-events: none;
            z-index: 50;
            font-size: 16px;
            opacity: 0;
            animation: pawAppear 1.2s ease forwards;
        }

        @keyframes pawAppear {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(var(--paw-rot, 0deg));
            }

            20% {
                opacity: 0.6;
                transform: scale(1.1) rotate(var(--paw-rot, 0deg));
            }

            100% {
                opacity: 0;
                transform: scale(0.8) rotate(var(--paw-rot, 0deg));
            }
        }
    </style>
</head>

<body>

    <!-- Main text -->
    <div class="scene">
        <div class="text-wrapper" id="textWrapper">
            <!-- Characters will be generated by JS -->
        </div>
        <div class="subtitle">♥ 聪不聪明 · 厉不厉害 ♥ </div>
    </div>

    <script>
        /* ================================================================
           CONFIG
           ================================================================ */
        const TEXT = '小孩姐我爱你';
        const CHAR_COLORS = [
            'linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%)',  // 温暖粉
            'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',  // 薰衣草紫
            'linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)',  // 梦幻蓝粉
            'linear-gradient(135deg, #fdcbf1 0%, #e6dee9 100%)',  // 柔和粉灰
            'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',  // 甜蜜粉
            'linear-gradient(135deg, #f6d365 0%, #fda085 100%)',  // 暖阳橘
        ];
        const EAR_COLORS = [
            '#ffb6c1', '#c7a5e0', '#a6c1ee', '#f0c4d8', '#f8a4b8', '#f9c874'
        ];

        /* ================================================================
           1. BUILD CHARACTERS
           ================================================================ */
        const wrapper = document.getElementById('textWrapper');
        const charEls = [];

        TEXT.split('').forEach((ch, i) => {
            const span = document.createElement('span');
            span.className = 'char';
            span.textContent = ch;
            span.style.backgroundImage = CHAR_COLORS[i % CHAR_COLORS.length];

            // Jelly shine overlay
            const shine = document.createElement('span');
            // Ears (cute animal ears, visible on hover)
            const earL = document.createElement('span');
            earL.className = 'ear-left';
            earL.style.background = EAR_COLORS[i % EAR_COLORS.length];

            const earR = document.createElement('span');
            earR.className = 'ear-right';
            earR.style.background = EAR_COLORS[i % EAR_COLORS.length];

            // Blush (hover)
            const blushL = document.createElement('span');
            blushL.className = 'blush-left';
            const blushR = document.createElement('span');
            blushR.className = 'blush-right';

            span.appendChild(earL);
            span.appendChild(earR);
            span.appendChild(blushL);
            span.appendChild(blushR);

            wrapper.appendChild(span);
            charEls.push(span);
        });

        /* ================================================================
           2. ENTRANCE ANIMATION — chars run in like little animals
           ================================================================ */
        const enterDirections = [
            { x: -300, y: 200, rot: -30 },   // bottom-left
            { x: 0, y: -300, rot: 15 },       // top
            { x: 300, y: 200, rot: 25 },      // bottom-right
            { x: -250, y: -150, rot: -20 },   // top-left
            { x: 250, y: -200, rot: 20 },     // top-right
            { x: 0, y: 350, rot: -10 },       // bottom
        ];

        charEls.forEach((el, i) => {
            const dir = enterDirections[i % enterDirections.length];
            el.style.setProperty('--enter-x', `${dir.x}px`);
            el.style.setProperty('--enter-y', `${dir.y}px`);
            el.style.setProperty('--enter-rot', `${dir.rot}deg`);
            el.style.setProperty('--enter-duration', `${1.0 + Math.random() * 0.4}s`);

            // Stagger entrance
            setTimeout(() => {
                el.classList.add('entering');
            }, 300 + i * 280);
        });

        /* ================================================================
           3. IDLE ANIMATIONS — random fidgets every few seconds
           ================================================================ */
        const idleClasses = ['idle-bounce', 'idle-wiggle', 'idle-squish', 'idle-peek', 'idle-jiggle'];

        function triggerIdleAnimation() {
            // Pick a random character
            const idx = Math.floor(Math.random() * charEls.length);
            const el = charEls[idx];

            // Don't interrupt entrance or another idle
            if (el.classList.contains('entering')) return;
            for (const cls of idleClasses) {
                if (el.classList.contains(cls)) return;
            }

            // Pick random animation
            const anim = idleClasses[Math.floor(Math.random() * idleClasses.length)];
            el.classList.add(anim);

            // Remove after animation ends
            el.addEventListener('animationend', () => {
                el.classList.remove(anim);
            }, { once: true });
        }

        // Start idle loop after entrance completes
        const entranceDuration = 300 + charEls.length * 280 + 1400;
        setTimeout(() => {
            // Trigger idle animations at random intervals (2-5s)
            function scheduleIdle() {
                const delay = 1500 + Math.random() * 2500;
                setTimeout(() => {
                    triggerIdleAnimation();
                    // Sometimes trigger two chars at once for fun
                    if (Math.random() < 0.3) {
                        setTimeout(triggerIdleAnimation, 150);
                    }
                    scheduleIdle();
                }, delay);
            }
            scheduleIdle();
        }, entranceDuration);

        /* ================================================================
           4. CLICK — hearts & sparkles burst
           ================================================================ */
        charEls.forEach(el => {
            el.addEventListener('click', e => {
                const symbols = ['💖', '💕', '🌸', '✨', '💗', '🎀', '🩷', '⭐'];
                for (let i = 0; i < 10; i++) {
                    const h = document.createElement('div');
                    h.className = 'click-heart';
                    h.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    h.style.left = e.clientX + 'px';
                    h.style.top = e.clientY + 'px';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 50 + Math.random() * 100;
                    h.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                    h.style.setProperty('--dy', `${Math.sin(angle) * dist - 60}px`);
                    h.style.setProperty('--rot', `${Math.random() * 360 - 180}deg`);
                    h.style.fontSize = (16 + Math.random() * 20) + 'px';
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 1000);
                }
            });
        });

        /* ================================================================
           5. FLOATING DECORATIONS — cute emoji background (CSS only, no canvas)
           ================================================================ */
        const decoEmoji = ['🌸', '🩷', '⭐', '🎀', '🌷', '🍬', '🦋', '✨', '💫', '🌈', '🍡', '🐾'];

        function spawnDeco() {
            const d = document.createElement('div');
            d.className = 'deco';
            d.textContent = decoEmoji[Math.floor(Math.random() * decoEmoji.length)];
            d.style.left = Math.random() * 100 + 'vw';
            d.style.bottom = '-40px';
            d.style.fontSize = (18 + Math.random() * 24) + 'px';
            d.style.opacity = 0.2 + Math.random() * 0.3;
            const dur = 10 + Math.random() * 12;
            d.style.animationDuration = dur + 's';
            d.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), (dur + 2) * 1000);
        }

        // Spawn initial batch
        for (let i = 0; i < 8; i++) {
            setTimeout(spawnDeco, Math.random() * 3000);
        }
        // Keep spawning
        setInterval(spawnDeco, 1800);

        /* ================================================================
           6. MOUSE TRAIL — cute paw prints 🐾
           ================================================================ */
        let lastPawTime = 0;
        document.addEventListener('mousemove', e => {
            const now = Date.now();
            if (now - lastPawTime < 180) return; // throttle
            lastPawTime = now;

            if (Math.random() < 0.5) {
                const paw = document.createElement('div');
                paw.className = 'paw';
                paw.textContent = '🐾';
                paw.style.left = (e.clientX - 8 + (Math.random() - 0.5) * 10) + 'px';
                paw.style.top = (e.clientY - 8 + (Math.random() - 0.5) * 10) + 'px';
                paw.style.setProperty('--paw-rot', `${Math.random() * 40 - 20}deg`);
                paw.style.fontSize = (14 + Math.random() * 6) + 'px';
                document.body.appendChild(paw);
                setTimeout(() => paw.remove(), 1200);
            }
        });

        /* ================================================================
           7. OCCASIONAL SPARKLES around text
           ================================================================ */
        setInterval(() => {
            const wrapper = document.getElementById('textWrapper');
            const rect = wrapper.getBoundingClientRect();
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const x = rect.left + Math.random() * rect.width;
            const y = rect.top + Math.random() * rect.height;
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            const hue = 300 + Math.random() * 60;
            const size = 4 + Math.random() * 6;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.background = `hsl(${hue}, 80%, 75%)`;
            sparkle.style.boxShadow = `0 0 ${size * 2}px hsl(${hue}, 80%, 70%)`;
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 2500);
        }, 600);
    </script>
</body>

</html>
